version: "3.9"

services:
  # Prediction API (Backend)
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: machine-failure-api
    ports:
      - "8000:8000"
    volumes:
      - ./backend/models:/app/models:ro
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # Frontend (React App)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: machine-failure-ui
    ports:
      - "80:80"
    depends_on:
      - api
    restart: unless-stopped

  # IoT Sensor Simulator
  iot-simulator:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: machine-failure-iot-sim
    depends_on:
      api:
        condition: service_healthy
    command: python iot_simulator/sensor_simulator.py --api-url http://api:8000
    restart: unless-stopped

  # MQTT Broker
  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: iot-mqtt-broker
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf

  # PLC Emulator (Modbus TCP Server)
  plc-emulator:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: industrial-plc
    command: python industrial_iot/plc_emulator.py
    environment:
      - PYTHONUNBUFFERED=1

  # IoT Gateway (Modbus to MQTT)
  iot-gateway:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: industrial-gateway
    depends_on:
      - plc-emulator
      - mosquitto
    command: python industrial_iot/gateway.py
    environment:
      - MODBUS_HOST=plc-emulator
      - MQTT_HOST=mosquitto
      - PYTHONUNBUFFERED=1
